[build]
  publish = "."

# Caching for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Proxy GitHub Releases API (same-origin for CSP)
[[redirects]]
  from = "/api/latest-release"
  to = "https://api.github.com/repos/sakalliAI/matchbite/releases/latest"
  status = 200
  force = true
  [redirects.headers]
    Accept = "application/vnd.github.v3+json"

# Redirect www to non-www
[[redirects]]
  from = "https://www.matchbite.de/*"
  to = "https://matchbite.de/:splat"
  status = 301
  force = true
